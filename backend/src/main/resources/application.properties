spring.application.name=backend
server.port=8080

# Uploads
app.uploads.dir=uploads

# Multipart limits
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB
# n8n webhook (we will set actual URL after n8n is running)
n8n.webhook.url=http://localhost:5678/webhook/resume-parsed
